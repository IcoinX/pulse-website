<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE Protocol</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #8b5cf6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .debug { font-size: 0.75rem; color: #666; margin-bottom: 30px; }
        .event { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .event-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .icon { font-size: 1.5rem; }
        .badge { padding: 4px 10px; background: #222; border-radius: 6px; font-size: 0.8rem; color: #aaa; margin-right: 8px; }
        .badge.status-pending { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .error { color: #ef4444; padding: 20px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; }
        .loading { color: #666; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PULSE Protocol</h1>
        <p class="debug" id="debug">Loading...</p>
        <div id="content">
            <div class="loading">Loading events...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://plojsqsjykzqwdaolfpi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_r61eP5kLy0S15KiUXr4x0g_Fh0368BQ';
        
        document.getElementById('debug').textContent = `Supabase: ${SUPABASE_URL.slice(-15)} | Chain: 84532`;
        
        async function loadEvents() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const content = document.getElementById('content');
                
                if (data.length === 0) {
                    content.innerHTML = '<p style="color:#666">No events found.</p>';
                    return;
                }
                
                document.getElementById('debug').textContent += ` | Events: ${data.length}`;
                
                content.innerHTML = data.map(event => {
                    const icon = event.source_type === 'AGENT' ? '🤖' : event.source_type === 'ONCHAIN' ? '⛓️' : '📰';
                    const statusClass = event.status === 'PENDING' ? 'status-pending' : '';
                    return `
                        <div class="event">
                            <div class="event-header">
                                <span class="icon">${icon}</span>
                                <h3>${event.title}</h3>
                            </div>
                            <div>
                                <span class="badge">#${event.event_id}</span>
                                <span class="badge">${event.source_type}</span>
                                <span class="badge ${statusClass}">${event.status}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }
        
        loadEvents();
    </script>
</body>
</html>
